name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Lint check
        run: ruff check
        working-directory: backend
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint check
        run: npx eslint . --no-error-on-unmatched-pattern || true
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      # 暂无可用的前端测试文件，后续补充后再启用
      #- name: Run tests
      #  run: npm test
      #  working-directory: frontend
