<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主题编辑器</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg, #FAFAFA); color: var(--text, #1A1A2E);
  padding: 40px; max-width: 1000px; margin: 0 auto;
}
h1 { font-size: 24px; margin-bottom: 4px; }
.sub { color: var(--text-secondary, #6B7280); font-size: 14px; margin-bottom: 32px; }
.editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
@media (max-width:700px) { .editor-grid { grid-template-columns: 1fr; } }
.controls { display: flex; flex-direction: column; gap: 24px; }
.group { border: 1px solid var(--border,#E5E7EB); border-radius: 12px; padding: 16px; }
.group-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; opacity: .6; }
.row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.row label { font-size: 14px; font-weight: 500; flex-shrink: 0; min-width: 100px; }
.row input[type="color"] { width: 40px; height: 32px; border: 1px solid var(--border,#E5E7EB); border-radius: 6px; cursor: pointer; padding: 1px; background: none; }
.row input[type="range"] { width: 120px; }
.row .val { font-family: monospace; font-size: 12px; min-width: 70px; text-align: right; opacity: .6; }
.preview { position: sticky; top: 40px; }
.preview-card { background: var(--surface,#FFF); border-radius: var(--radius-md,20px); border: 2px solid var(--border,#E5E7EB); padding: 24px; margin-bottom: 16px; transition: all .3s; }
.preview-card h3 { font-size: 16px; margin-bottom: 8px; }
.preview-card p { font-size: 14px; opacity: .7; }
.preview-btn { display: inline-block; padding: 10px 28px; border-radius: 999px; border: none; background: var(--accent,#7B2FF7); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
.preview-row { display: flex; gap: 8px; margin-top: 12px; }
.preview-dot { width: 32px; height: 32px; border-radius: 50%; }
.actions { margin-top: 24px; display: flex; gap: 12px; }
.actions button { padding: 10px 24px; border-radius: 12px; border: 2px solid var(--border,#E5E7EB); background: var(--surface,#FFF); cursor: pointer; font-size: 14px; font-weight: 500; }
.actions button.primary { background: var(--accent,#7B2FF7); color: #fff; border-color: var(--accent,#7B2FF7); }
</style>
</head>
<body>
<h1>🎨 可视化主题编辑器</h1>
<p class="sub">点颜色 / 拖滑条 → 右侧实时预览 → 满意后点「导出配置」</p>
<div class="editor-grid">
<div class="controls" id="controls">
<div class="group"><div class="group-title">主色（按钮 / 高亮 / 选中）</div>
<div class="row"><label>主色</label><input type="color" id="c-accent" value="#7B2FF7"><span class="val" id="v-accent">#7B2FF7</span></div></div>
<div class="group"><div class="group-title">页面 &amp; 卡片</div>
<div class="row"><label>页面背景</label><input type="color" id="c-bg" value="#FAFAFA"><span class="val" id="v-bg">#FAFAFA</span></div>
<div class="row"><label>卡片底色</label><input type="color" id="c-surface" value="#FFFFFF"><span class="val" id="v-surface">#FFFFFF</span></div>
<div class="row"><label>卡片边框</label><input type="color" id="c-border" value="#E5E7EB"><span class="val" id="v-border">#E5E7EB</span></div>
<div class="row"><label>卡片圆角</label><input type="range" id="r-radius" min="4" max="40" value="20"><span class="val" id="v-radius">20px</span></div></div>
<div class="group"><div class="group-title">文字</div>
<div class="row"><label>正文</label><input type="color" id="c-text" value="#1A1A2E"><span class="val" id="v-text">#1A1A2E</span></div>
<div class="row"><label>次要文字</label><input type="color" id="c-secondary" value="#6B7280"><span class="val" id="v-secondary">#6B7280</span></div></div>
<div class="group"><div class="group-title">五维度色（报告页图表）</div>
<div class="row"><label>O 开放性</label><input type="color" id="c-o" value="#7B2FF7"><span class="val" id="v-o">#7B2FF7</span></div>
<div class="row"><label>C 严谨性</label><input type="color" id="c-c" value="#00B4D8"><span class="val" id="v-c">#00B4D8</span></div>
<div class="row"><label>E 外向性</label><input type="color" id="c-e" value="#FFD60A"><span class="val" id="v-e">#FFD60A</span></div>
<div class="row"><label>A 宜人性</label><input type="color" id="c-a" value="#06D6A0"><span class="val" id="v-a">#06D6A0</span></div>
<div class="row"><label>N 神经质</label><input type="color" id="c-n" value="#FF006E"><span class="val" id="v-n">#FF006E</span></div></div>
<div class="actions">
<button class="primary" onclick="exportConfig()">📋 导出配置</button>
<button onclick="resetAll()">↩️ 恢复默认</button>
</div></div>
<div class="preview">
<div class="preview-card"><h3>示例卡片</h3><p>改左边这里实时变化</p><div style="margin-top:12px"><button class="preview-btn">示例按钮</button></div></div>
<div class="preview-card"><h3>五维度色</h3><div class="preview-row">
<div class="preview-dot" style="background:#7B2FF7" id="dot-o"></div>
<div class="preview-dot" style="background:#00B4D8" id="dot-c"></div>
<div class="preview-dot" style="background:#FFD60A" id="dot-e"></div>
<div class="preview-dot" style="background:#06D6A0" id="dot-a"></div>
<div class="preview-dot" style="background:#FF006E" id="dot-n"></div>
</div></div></div></div>
<div class="modal-overlay" id="exportModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;z-index:100">
<div style="background:var(--surface,#FFF);border-radius:20px;padding:24px;max-width:500px;width:90%">
<h3 style="margin-bottom:12px">📋 复制这段代码</h3>
<p style="font-size:13px;margin-bottom:12px;opacity:0.7">替换 <code>global.css</code> 的 <code>:root { ... }</code> 部分</p>
<textarea id="exportCode" style="width:100%;height:200px;font-family:monospace;font-size:12px;padding:12px;border:1px solid var(--border,#E5E7EB);border-radius:8px" readonly></textarea>
<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
<button onclick="copyExport()" style="padding:8px 20px;border-radius:8px;border:2px solid var(--border,#E5E7EB);cursor:pointer">📋 复制</button>
<button onclick="document.getElementById('exportModal').style.display='none'" style="padding:8px 20px;border-radius:8px;border:2px solid var(--border,#E5E7EB);cursor:pointer">关闭</button>
</div></div></div>
<script>
const D={accent:'#7B2FF7',bg:'#FAFAFA',surface:'#FFFFFF',border:'#E5E7EB',text:'#1A1A2E',secondary:'#6B7280',radius:20,o:'#7B2FF7',c:'#00B4D8',e:'#FFD60A',a:'#06D6A0',n:'#FF006E'};
let C={...D};
function up(){
C.accent=g('c-accent');C.bg=g('c-bg');C.surface=g('c-surface');C.border=g('c-border');C.text=g('c-text');C.secondary=g('c-secondary');
C.radius=parseInt(document.getElementById('r-radius').value);
C.o=g('c-o');C.c=g('c-c');C.e=g('c-e');C.a=g('c-a');C.n=g('c-n');
const r=document.documentElement;
r.style.setProperty('--accent',C.accent);r.style.setProperty('--bg',C.bg);r.style.setProperty('--surface',C.surface);
r.style.setProperty('--border',C.border);r.style.setProperty('--text',C.text);r.style.setProperty('--text-secondary',C.secondary);
r.style.setProperty('--radius-md',C.radius+'px');
['o','c','e','a','n'].forEach(k=>document.getElementById('dot-'+k).style.background=C[k]);
['accent','bg','surface','border','text','secondary','o','c','e','a','n'].forEach(k=>{const e=document.getElementById('v-'+k);if(e)e.textContent=C[k];});
document.getElementById('v-radius').textContent=C.radius+'px';
}
function g(id){return document.getElementById(id).value;}
function exportConfig(){
const code='  --color-accent: '+C.accent+';\n  --color-bg: '+C.bg+';\n  --color-surface: '+C.surface+';\n  --color-text: '+C.text+';\n  --color-text-secondary: '+C.secondary+';\n  --color-border: '+C.border+';\n  --color-openness: '+C.o+';\n  --color-conscientiousness: '+C.c+';\n  --color-extraversion: '+C.e+';\n  --color-agreeableness: '+C.a+';\n  --color-neuroticism: '+C.n+';\n  --radius-md: '+C.radius+'px;';
document.getElementById('exportCode').value=code;document.getElementById('exportModal').style.display='flex';
}
function copyExport(){const ta=document.getElementById('exportCode');ta.select();navigator.clipboard.writeText(ta.value);const btn=document.querySelector('#exportModal button:first-child');btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent='📋 复制',2000);}
function resetAll(){C={...D};['c-accent','c-bg','c-surface','c-border','c-text','c-secondary','c-o','c-c','c-e','c-a','c-n'].forEach(id=>document.getElementById(id).value=C[id.replace('c-','')]);document.getElementById('r-radius').value=C.radius;up();}
document.querySelectorAll('#controls input').forEach(el=>el.addEventListener('input',up));
up();
</script>
</body>
</html>
